<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiCar Pro Controller</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; overflow-x: hidden; }
        .header { background: #16213e; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #0f3460; }
        .header h1 { font-size: 1.3em; color: #e94560; }
        .status-bar { display: flex; gap: 15px; font-size: 0.85em; }
        .status-item { display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.online { background: #4ecca3; }
        .status-dot.offline { background: #e94560; }

        .main { display: flex; height: calc(100vh - 50px); }

        .video-panel { flex: 2; padding: 10px; display: flex; flex-direction: column; }
        .video-container { flex: 1; background: #000; border-radius: 8px; overflow: hidden; position: relative; }
        .video-container img { width: 100%; height: 100%; object-fit: contain; }
        .video-overlay { position: absolute; top: 10px; left: 10px; color: #4ecca3; font-size: 0.8em; }
        .cv-controls { background: #16213e; border-radius: 8px; padding: 10px; margin-top: 10px; }
        .cv-controls h3 { margin-bottom: 8px; color: #4ecca3; font-size: 0.9em; }
        .cv-modes { display: flex; gap: 8px; flex-wrap: wrap; }
        .cv-btn { padding: 6px 14px; border: 1px solid #0f3460; background: #1a1a2e; color: #eee; border-radius: 4px; cursor: pointer; font-size: 0.8em; }
        .cv-btn.active { background: #e94560; border-color: #e94560; }
        .cv-btn:hover { background: #0f3460; }

        .control-panel { flex: 1; padding: 10px; overflow-y: auto; background: #16213e; }

        .section { margin-bottom: 15px; }
        .section h3 { color: #4ecca3; font-size: 0.85em; margin-bottom: 8px; border-bottom: 1px solid #0f3460; padding-bottom: 4px; }

        .dpad { display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); gap: 4px; justify-content: center; margin: 10px 0; }
        .dpad-btn { background: #0f3460; border: none; color: #eee; font-size: 1.2em; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .dpad-btn:hover { background: #e94560; }
        .dpad-btn:active { background: #4ecca3; }
        .dpad-btn.stop { background: #e94560; }
        .dpad-center { background: transparent; }

        .slider-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .slider-row label { width: 60px; font-size: 0.75em; }
        .slider-row input[type="range"] { flex: 1; }
        .slider-row .val { width: 30px; text-align: right; font-size: 0.75em; }

        .led-modes { display: flex; flex-wrap: wrap; gap: 4px; }
        .led-btn { padding: 4px 10px; background: #1a1a2e; border: 1px solid #0f3460; color: #eee; border-radius: 4px; cursor: pointer; font-size: 0.75em; }
        .led-btn:hover { background: #0f3460; }

        .func-buttons { display: flex; flex-wrap: wrap; gap: 4px; }
        .func-btn { padding: 6px 12px; background: #0f3460; border: none; color: #eee; border-radius: 4px; cursor: pointer; font-size: 0.75em; }
        .func-btn:hover { background: #e94560; }
        .func-btn.stop-btn { background: #e94560; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 0.75em; }
        .info-item { background: #1a1a2e; padding: 4px 8px; border-radius: 4px; }
        .info-label { color: #888; }
        .info-value { color: #4ecca3; font-weight: bold; }

        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .control-panel { flex: none; height: 50vh; }
            .video-panel { flex: none; height: 50vh; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 PiCar Pro</h1>
        <div class="status-bar">
            <div class="status-item"><div class="status-dot" id="wsStatus"></div><span id="wsText">Connecting...</span></div>
            <div class="status-item">🔋 <span id="batteryText">--</span></div>
            <div class="status-item">🌡️ <span id="cpuText">--</span></div>
        </div>
    </div>

    <div class="main">
        <div class="video-panel">
            <div class="video-container">
                <img id="videoFeed" src="" alt="Camera feed">
                <div class="video-overlay" id="cvOverlay">CV: none</div>
            </div>
            <div class="cv-controls">
                <h3>Computer Vision</h3>
                <div class="cv-modes">
                    <button class="cv-btn active" onclick="setCVMode('none')">Off</button>
                    <button class="cv-btn" onclick="setCVMode('findColor')">Color Track</button>
                    <button class="cv-btn" onclick="setCVMode('findlineCV')">Line Follow</button>
                    <button class="cv-btn" onclick="setCVMode('watchDog')">Motion Detect</button>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <div class="section">
                <h3>Movement</h3>
                <div class="dpad">
                    <div class="dpad-center"></div>
                    <button class="dpad-btn" onclick="sendCmd('forward')">▲</button>
                    <div class="dpad-center"></div>
                    <button class="dpad-btn" onclick="sendCmd('left')">◄</button>
                    <button class="dpad-btn stop" onclick="sendCmd('stop')">■</button>
                    <button class="dpad-btn" onclick="sendCmd('right')">►</button>
                    <div class="dpad-center"></div>
                    <button class="dpad-btn" onclick="sendCmd('backward')">▼</button>
                    <div class="dpad-center"></div>
                </div>
                <div class="slider-row">
                    <label>Speed</label>
                    <input type="range" id="speedSlider" min="0" max="100" value="50" oninput="setSpeed(this.value)">
                    <span class="val" id="speedVal">50</span>
                </div>
            </div>

            <div class="section">
                <h3>Servos</h3>
                <div class="slider-row"><label>Pan</label><input type="range" min="0" max="180" value="90" oninput="setServo(0,this.value)"><span class="val">90</span></div>
                <div class="slider-row"><label>Tilt</label><input type="range" min="0" max="180" value="90" oninput="setServo(1,this.value)"><span class="val">90</span></div>
                <div class="slider-row"><label>Base</label><input type="range" min="0" max="180" value="90" oninput="setServo(2,this.value)"><span class="val">90</span></div>
                <div class="slider-row"><label>Shoulder</label><input type="range" min="0" max="180" value="90" oninput="setServo(3,this.value)"><span class="val">90</span></div>
                <div class="slider-row"><label>Elbow</label><input type="range" min="0" max="180" value="90" oninput="setServo(4,this.value)"><span class="val">90</span></div>
                <div class="slider-row"><label>Wrist</label><input type="range" min="0" max="180" value="90" oninput="setServo(5,this.value)"><span class="val">90</span></div>
                <div class="slider-row"><label>Gripper</label><input type="range" min="0" max="180" value="90" oninput="setServo(6,this.value)"><span class="val">90</span></div>
            </div>

            <div class="section">
                <h3>LEDs</h3>
                <div class="led-modes">
                    <button class="led-btn" onclick="setLED('off')">Off</button>
                    <button class="led-btn" onclick="setLED('solid')">Solid</button>
                    <button class="led-btn" onclick="setLED('breath')">Breath</button>
                    <button class="led-btn" onclick="setLED('flowing')">Flowing</button>
                    <button class="led-btn" onclick="setLED('rainbow')">Rainbow</button>
                    <button class="led-btn" onclick="setLED('police')">Police</button>
                </div>
            </div>

            <div class="section">
                <h3>Autonomous</h3>
                <div class="func-buttons">
                    <button class="func-btn" onclick="sendCmd('function','radarScan')">Radar</button>
                    <button class="func-btn" onclick="sendCmd('function','automatic')">Auto Drive</button>
                    <button class="func-btn" onclick="sendCmd('function','trackLine')">Line Follow</button>
                    <button class="func-btn" onclick="sendCmd('function','keepDistance')">Keep Dist</button>
                    <button class="func-btn stop-btn" onclick="sendCmd('function','stop')">STOP</button>
                </div>
            </div>

            <div class="section">
                <h3>System</h3>
                <div class="info-grid">
                    <div class="info-item"><span class="info-label">CPU: </span><span class="info-value" id="cpuInfo">--</span></div>
                    <div class="info-item"><span class="info-label">RAM: </span><span class="info-value" id="ramInfo">--</span></div>
                    <div class="info-item"><span class="info-label">Battery: </span><span class="info-value" id="battInfo">--</span></div>
                    <div class="info-item"><span class="info-label">Distance: </span><span class="info-value" id="distInfo">--</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WS_URL = `ws://${window.location.hostname}:8888`;
        const VIDEO_URL = `/video_feed`;
        let ws = null;

        // Connect to video feed
        document.getElementById('videoFeed').src = VIDEO_URL;

        // Connect to WebSocket
        function connectWS() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => {
                document.getElementById('wsStatus').className = 'status-dot online';
                document.getElementById('wsText').textContent = 'Connected';
                requestStatus();
            };
            ws.onclose = () => {
                document.getElementById('wsStatus').className = 'status-dot offline';
                document.getElementById('wsText').textContent = 'Disconnected';
                setTimeout(connectWS, 3000);
            };
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'status') {
                        updateStatus(data);
                    }
                } catch(e) {}
            };
        }

        function sendCmd(command, value = '') {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ command, value }));
            }
        }

        function setSpeed(val) {
            document.getElementById('speedVal').textContent = val;
            sendCmd('speed', val);
        }

        function setServo(id, angle) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ command: 'servo', id, angle: parseInt(angle) }));
            }
        }

        function setCVMode(mode) {
            document.querySelectorAll('.cv-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            sendCmd('cvMode', mode);
            document.getElementById('cvOverlay').textContent = 'CV: ' + mode;
        }

        function setLED(mode) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ command: 'led', mode, color: [255, 0, 0] }));
            }
        }

        function requestStatus() {
            sendCmd('status');
            setTimeout(requestStatus, 3000);
        }

        function updateStatus(data) {
            document.getElementById('cpuInfo').textContent = data.cpu_temp + 'C / ' + data.cpu_usage + '%';
            document.getElementById('ramInfo').textContent = data.ram ? data.ram.percent + '%' : '--';
            document.getElementById('battInfo').textContent = data.voltage + 'V (' + data.battery + '%)';
            document.getElementById('distInfo').textContent = data.distance + 'cm';
            document.getElementById('batteryText').textContent = data.voltage + 'V';
            document.getElementById('cpuText').textContent = data.cpu_temp + 'C';
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'w': sendCmd('forward'); break;
                case 's': sendCmd('backward'); break;
                case 'a': sendCmd('left'); break;
                case 'd': sendCmd('right'); break;
                case ' ': sendCmd('stop'); e.preventDefault(); break;
            }
        });
        document.addEventListener('keyup', (e) => {
            if (['w','s','a','d'].includes(e.key.toLowerCase())) {
                sendCmd('stop');
            }
        });

        connectWS();
    </script>
</body>
</html>
